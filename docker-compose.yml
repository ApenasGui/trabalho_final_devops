services:
  postgres:
    image: 'postgres:15'
    environment:
      POSTGRES_USER: 'user'
      POSTGRES_PASSWORD: 'password321'
      POSTGRES_DB: 'trabalho_devops'
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d trabalho_devops"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./database:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: 'user' 
      DB_PASSWORD: 'password321'
      DB_NAME: 'trabalho_devops'
