jobs:
  test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências do backend
        run: npm ci
        working-directory: backend
      - name: Rodar testes
        run: npm test
        working-directory: backend

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
        node-version: 22

      - name: Instalar e buildar 
        run: npm ci && npm run build
        working-directory: frontend

      - name: build frontend
        run: docker build -t frontend ./frontend

      - name: build backend
        run: docker build -t backend ./backend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build e push backend
        run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest \
                    -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }} \
                    ./backend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}
        
      - name: Build e push frontend
        run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest \
                  -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }} \
                  ./frontend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

      - name: Rollback em caso de falha
        if: failure()
        run: |
          echo "Deploy falhou. Revertendo para versão anterior..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/backend:previous || true